@(header: String, headerExtra: Option[Html] = None, subTitle: Option[String] = None)
@headerExtra match{
	case None => {
		<div class="mt-4">
			<h1>
				@header
				@for(sub <- subTitle){
					<small>@sub</small>
				}
			</h1>
		</div>
	}
	case Some(extra) => {
		<div class="row">
			<div class="col-md-9 mt-4">
				<h1>@header</h1>
			</div>
			@extra
		</div>
	}
}
